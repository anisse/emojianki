<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title> Emoji Anki cards </title>
    <style type="text/css">
      body {
          margin: 0;
          overflow: hidden;
      }
    </style>
  </head>
  <body>
    <script type="module">
      import init, { generate_set }from "./emojianki.js";
      await init();
      const downloadURL = (data, fileName) => {
        const a = document.createElement('a')
        a.href = data
        a.download = fileName
        document.body.appendChild(a)
        a.style.display = 'none'
        a.click()
        a.remove()
      }

      const downloadBlob = (data, fileName, mimeType) => {
        const blob = new Blob([data], {
          type: mimeType
        })
        const url = window.URL.createObjectURL(blob)
        downloadURL(url, fileName)
        setTimeout(() => window.URL.revokeObjectURL(url), 1000)
      }

    document.getElementById("dl").addEventListener("click", (_e) => {
      const out = generate_set();
      downloadBlob(out, 'emojis.apkg', 'application/octet-stream');
    });
    </script>
    <a href="#" id="dl">Download</a>
  </body>
</html>
