<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title> Emoji Anki cards </title>
    <link rel="stylesheet" href="catppuccin.css">
    <link rel="stylesheet" href="mvp.css">
    <style type="text/css">
      :root {
        color-scheme: light dark;
        /* MVP */
        --border-radius: 9999px;
        --font-family: -apple-system,BlinkMacSystemFont,avenir next,avenir,segoe ui,helvetica neue,Cantarell,Ubuntu,roboto,noto,helvetica,arial,sans-serif;
        --box-shadow: 0;
        /* MVP - cattpuccin integration */
        --color-accent: var(--surface0);
        --color-bg: var(--base);
        --color-bg-secondary: var(--mantle);
        --color-link: var(--blue);
        --color-secondary: var(--mauve);
        --color-secondary-accent: var(--surface1);
        --color-shadow: var(--surface0);
        --color-table: var(--crust);
        --color-text: var(--text);
        --color-text-secondary: var(--subtext0);
        --color-scrollbar: var(--surface2);

        --inverted-text: var(--base);
      }

      * {
        /* MVP override */
        scrollbar-width: auto;
      }
      select {
        appearance: base-select; /* Chrome only, but soon in FF, maybe */
        border: 2px solid var(--color-shadow);
        border-radius: 8px;
        background: var(--color-table);
        padding: 0;
        width: 300px;
      }

      option {
        padding: 10px;
      }

      option:nth-of-type(odd) {
        background: var(--color-bg-secondary);
      }
      option:checked {
        font-weight: bold;
        background: var(--pink);
        /* Firefox hack: override default blue color with an inward box-shadow */
        box-shadow: 0 0 10px 100px var(--pink) inset;
      }
      option:checked, option:hover, option:focus {
        color: var(--inverted-text);
      }
      option:hover {
        background: var(--rosewater);
      }
      option:focus{
        background: var(--flamingo);
      }
      h1 {
        font-weight: 900;
        color: var(--color-secondary);
      }
      button {
        background-color: var(--mauve);
        background-image: linear-gradient(120deg,var(--mauve),var(--pink));
        display: block;
      }
      section aside, fieldset {
        border: 0;
      }
      header {
        padding: 0;
      }
      label {
        padding: 5px;
        width: 80%;
      }
    </style>
  </head>
  <body>
    <script type="module">
      import init, { new_emojianki } from "./emojianki.js";

      function downloadURL(data, fileName) {
        const a = document.createElement('a')
        a.href = data
        a.download = fileName
        document.body.appendChild(a)
        a.style.display = 'none'
        a.click()
        a.remove()
      }

      function downloadBlob(data, fileName, mimeType) {
        const blob = new Blob([data], {
          type: mimeType
        })
        const url = window.URL.createObjectURL(blob)
        downloadURL(url, fileName)
        setTimeout(() => window.URL.revokeObjectURL(url), 1000)
      }

      function getLanguage(locales) {
          const langList = navigator.languages || ["en"];
          return langList
                .map((l) => l.replace("-", "_"))
                .filter((l) => locales.includes(l))[0] ||
                langList
                .map((l) => l.split("-")[0])
                .filter((l) => locales.includes(l))[0] ||
                "en";
      }
      async function getData(url) {
          try {
              const response = await fetch(url);
              if (!response.ok) {
                  throw new Error(`Response status: ${response.status}`);
              }

              const bytes = await response.bytes();
              return bytes;
          } catch (error) {
              console.error(error.message);
          }
      }
      async function downloadDeck(ea, langSelect, catFieldSet) {
        const annot = await getData("cldr/annotations/" + langSelect.value + ".xml");
        const annotDerived = await getData("cldr/annotationsDerived/" + langSelect.value + ".xml");
        const checked = Array.from(document.getElementById("cat").childNodes.values().filter((c) => c.checked));
        const name = "EmojiAnki: " + langSelect.selectedOptions[0].innerText + " - " + checked.map((c) => c.value).join(", ");
        var filename = "EmojiAnki_" + langSelect.selectedOptions[0].innerText.replaceAll(" ", "-");
        if (checked.length == 1) {
          filename += "_" +  checked[0].value.replaceAll(" ", "-");
        }
        filename += ".apkg";
        const out = ea.generate_set(name, annot, annotDerived,
                checked.map((c) => c.name));
        downloadBlob(out, filename, 'application/octet-stream');
      }

      async function run () {
        const ea = new_emojianki();
        const locales = ea.locales();
        const locale = getLanguage(locales);
        const main = await getData("cldr/main/" + locale + ".xml");
        const languages = ea.languages(main);
        const categories = ea.categories(main);
        console.log(categories);
        const langSelect = document.getElementById("lang");
        languages
          .map((l) => [l.name, l.locale_name])
          .sort(([,a],[,b]) => a.toLowerCase().localeCompare(b.toLowerCase()))
          .forEach(([key, text]) => {
              var option = document.createElement("option");
              option.text = text;
              option.value = key;
              langSelect.add(option);
          })
        const catFieldSet = document.getElementById("cat");
        categories
          .map((l) => [l.name, l.locale_name])
          .sort(([,a],[,b]) => a.toLowerCase().localeCompare(b.toLowerCase()))
          .forEach(([key, text]) => {
              var input = document.createElement("input");
              var label = document.createElement("label");
              input.name = key;
              input.id = key;
              input.value = text;
              input.type = "checkbox";
              label.innerText = text;
              label.htmlFor = key;
              catFieldSet.appendChild(input);
              catFieldSet.appendChild(label);
              catFieldSet.appendChild(document.createElement("br"));
          })
        document.getElementById("dl").addEventListener("click", (_e) => downloadDeck(ea, langSelect, catFieldSet));
      }
      await init();
      await run();
    </script>
    <header>
      <h1>Emoji Anki</h1>
      <p>Learn languages, flags, or simply emoji names, with Anki.</p>
    </header>
    <main>
      <section>
        <aside>
          <h3><label for="lang">Response language</label></h3>
          <select id="lang" name="languages" size="10"> </select>
        </aside>
        <aside>
          <fieldset id="cat">
            <h3><legend>Emoji category</legend></h3>
          </fieldset>
        </aside>
      </section>
      <section>
        <button type="button" id="dl">Download Anki Deck</button>
      </section>
    </main>
  </body>
</html>
